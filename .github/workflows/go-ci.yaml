name: Go CI
permissions:
  contents: read
on:
  push:
    branches:
      - main
    paths:
      - 'omnillm/**.go'
      - 'omnillm/go.mod'
      - 'omnillm/go.sum'
      - 'omnistorage/**.go'
      - 'omnistorage/go.mod'
      - 'omnistorage/go.sum'
      - '.github/workflows/go-ci.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'omnillm/**.go'
      - 'omnillm/go.mod'
      - 'omnillm/go.sum'
      - 'omnistorage/**.go'
      - 'omnistorage/go.mod'
      - 'omnistorage/go.sum'
      - '.github/workflows/go-ci.yaml'
  workflow_dispatch:

jobs:
  ci:
    uses: plexusone/.github/.github/workflows/go-ci.yaml@main
    with:
      modules: '["omnillm", "omnistorage"]'
