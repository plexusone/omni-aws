name: Go Lint
permissions:
  contents: read
on:
  push:
    branches:
      - main
    paths:
      - 'omnillm/**.go'
      - 'omnillm/go.mod'
      - 'omnillm/go.sum'
      - 'omnillm/.golangci.yaml'
      - 'omnistorage/**.go'
      - 'omnistorage/go.mod'
      - 'omnistorage/go.sum'
      - 'omnistorage/.golangci.yaml'
      - '.github/workflows/go-lint.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'omnillm/**.go'
      - 'omnillm/go.mod'
      - 'omnillm/go.sum'
      - 'omnillm/.golangci.yaml'
      - 'omnistorage/**.go'
      - 'omnistorage/go.mod'
      - 'omnistorage/go.sum'
      - 'omnistorage/.golangci.yaml'
      - '.github/workflows/go-lint.yaml'
  workflow_dispatch:

jobs:
  lint:
    uses: plexusone/.github/.github/workflows/go-lint.yaml@main
    with:
      modules: '["omnillm", "omnistorage"]'
